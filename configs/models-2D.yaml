general:
  batch_size: 2048 # Training
  learning_rate: 0.01 # Training
  loss_logging_frequency: 100 # Each N epoch we print and save the loss
  boundary_threshold: 0.1 # Decision boundary when converting continous model output to binary 
  inf_bench_query_size: 10000000 # 10M, size of query to speed benchmark inference with
  inf_bench_repitions: 1000 # Number of repitions to average speed benchmark 
  fp_slope_stop: -0.003 # Training stop criteria - If difference to last 5 FP rates is smaller than can stop

