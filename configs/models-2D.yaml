general:
  batch_size: 2048
  epochs: 100
  learning_rate: 0.01
  loss_logging_frequency: 100 # Each N epoch we print and save the loss
  boundary_threshold: 0.1 # Decision boundary when converting continous model output to binary 

mlp01:
  type: 'mlp'
  hidden_layer: [4,4,4]
mlp02:
  type: 'mlp'
  hidden_layer: [16,16,16]
mlp03:
  type: 'mlp'
  hidden_layer: [128,128,128]

moe01:
  type: 'moe'
  nex : 2 # Number of Experts
  expert_hidden_layer: [4,4]
  gate_hidden_layer: []
moe02:
  type: 'moe'
  nex : 8
  expert_hidden_layer: [8,8]
  gate_hidden_layer: []
moe03:
  type: 'moe'
  nex : 64
  expert_hidden_layer: [16,16]
  gate_hidden_layer: []